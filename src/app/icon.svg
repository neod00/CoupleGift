<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e67" />
      <stop offset="100%" stop-color="#ff5757" />
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fd1c5" />
      <stop offset="100%" stop-color="#319795" />
    </linearGradient>
  </defs>
  
  <!-- Box Base -->
  <rect x="10" y="35" width="80" height="60" rx="6" fill="url(#boxGrad)" />
  
  <!-- Box Lid -->
  <rect x="5" y="20" width="90" height="18" rx="4" fill="url(#boxGrad)" />
  
  <!-- Vertical Ribbon -->
  <rect x="40" y="20" width="20" height="75" fill="url(#ribbonGrad)" />
  
  <!-- Horizontal Ribbon over lid -->
  <rect x="5" y="24" width="90" height="10" fill="url(#ribbonGrad)" />
  
  <!-- Left Bow -->
  <path d="M50 20 C25 5, 20 25, 45 20 C50 20, 50 20, 50 20 Z" fill="url(#ribbonGrad)" />
  
  <!-- Right Bow -->
  <path d="M50 20 C75 5, 80 25, 55 20 C50 20, 50 20, 50 20 Z" fill="url(#ribbonGrad)" />
  
  <!-- Bow Center Knot -->
  <circle cx="50" cy="20" r="6" fill="#285e61" />
</svg>
