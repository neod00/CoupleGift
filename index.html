    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <title>💝 커플 기념일 선물 추천기 - AI가 추천하는 특별한 선물</title>
  </head>
  <body>
    <noscript>이 앱을 실행하려면 JavaScript가 필요합니다.</noscript>
    <div id="root"></div>
    
    <!-- AdSense 스크립트는 React 컴포넌트에서 동적으로 로드 -->
    <script>
      // AdSense 스크립트를 동적으로 로드하는 함수
      function loadAdSenseScript() {
        const publisherId = '%REACT_APP_ADSENSE_PUBLISHER_ID%';
        
        // 환경 변수가 실제로 설정되었는지 확인 (빌드 시 치환되지 않으면 %로 감싸진 문자열 그대로 남음)
        if (publisherId && !publisherId.includes('%')) {
          const script = document.createElement('script');
          script.async = true;
          script.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${publisherId}`;
          script.crossOrigin = 'anonymous';
          document.head.appendChild(script);
          console.log('✅ AdSense 스크립트가 로드되었습니다:', publisherId);
        } else {
          console.log('ℹ️ AdSense Publisher ID가 설정되지 않았습니다. 광고를 표시하지 않습니다.');
        }
      }
      
      // 페이지 로드 후 AdSense 스크립트 로드
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadAdSenseScript);
      } else {
        loadAdSenseScript();
      }
    </script>
  </body>
</html>
