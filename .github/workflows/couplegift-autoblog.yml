name: Auto Blog Publish
on:
  schedule:
    # Run every Mon, Wed, Fri at 00:00 UTC (09:00 KST)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Auto Blog Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          npx tsx scripts/auto-blog-cron.ts

      - name: Commit and Push new JSON post
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/blog/posts/*.json
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "No new blog generated to commit"
          else
            git commit -m "chore(blog): auto-publish SEO blog via Gemini AI 🤖"
            git push
          fi
